<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"UTF-8\">
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
  <title>AXIS — Lily's AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0f0f12;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --text: #e8e8ed;
      --muted: #6b6b78;
      --gold: #d4a853;
      --terra: #c47a5a;
      --accent: #7a9fc9;
      --success: #6ab87a;
      --error: #c76a6a;
    }
    
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .api-key-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .api-key-modal.hidden { display: none; }
    .api-key-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    .api-key-box h2 { color: var(--gold); margin-bottom: 0.5rem; font-size: 1.5rem; }
    .api-key-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
    .api-key-input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .api-key-input:focus { border-color: var(--gold); outline: none; }
    .api-key-btn {
      width: 100%;
      padding: 0.875rem;
      background: var(--gold);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .api-key-btn:hover { transform: scale(1.02); }
    
    .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--terra) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--bg);
    }
    
    .logo-text {
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
    }
    
    .logo-sub {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .settings-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
    }
    .settings-btn:hover { border-color: var(--gold); color: var(--gold); }
    .settings-btn svg { width: 18px; height: 18px; }
    
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 0;
    }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .message {
      max-width: 85%;
      padding: 1rem 1.25rem;
      border-radius: 16px;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
      font-size: 0.95rem;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      align-self: flex-end;
      background: var(--gold);
      color: var(--bg);
      border-bottom-right-radius: 4px;
    }
    
    .message.axis {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    
    .message.error {
      background: var(--error);
      color: white;
    }
    
    .agent-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      background: var(--accent);
      color: var(--bg);
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 0.5rem;
    }
    
    .input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    
    .input-wrapper {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    
    .input-box {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      font-size: 1rem;
      color: var(--text);
      resize: none;
      min-height: 48px;
      max-height: 150px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    
    .input-box:focus { outline: none; border-color: var(--gold); }
    .input-box::placeholder { color: var(--muted); }
    
    .send-btn {
      width: 48px;
      height: 48px;
      background: var(--gold);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn svg { width: 20px; height: 20px; fill: var(--bg); }
    
    .typing {
      display: flex;
      gap: 4px;
      padding: 1rem;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    
    .welcome {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--muted);
    }
    .welcome h2 { font-size: 1.5rem; color: var(--gold); margin-bottom: 0.5rem; }
    .welcome p { font-size: 0.95rem; line-height: 1.6; }
    
    .schedule-widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin: 0 1.5rem 1rem;
    }
    .schedule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .schedule-header h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .schedule-day { font-size: 0.85rem; color: var(--gold); }
    .schedule-blocks { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .schedule-block {
      padding: 0.4rem 0.75rem;
      background: var(--bg);
      border-radius: 6px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .schedule-block.active { background: var(--gold); color: var(--bg); }
    
    .session-stats {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.5rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1.5rem;
    }
    .session-stats span { display: flex; align-items: center; gap: 0.3rem; }
  </style>
</head>
<body>
  <!-- API Key Modal -->
  <div id=\"apiKeyModal\" class=\"api-key-modal\">
    <div class=\"api-key-box\">
      <h2>Enter Your API Key</h2>
      <p>AXIS needs your Anthropic API key to function. Get one at console.anthropic.com</p>
      <input type=\"password\" class=\"api-key-input\" id=\"apiKeyInput\" placeholder=\"sk-ant-...\" onkeydown=\"if(event.key==='Enter')saveApiKey()\">
      <button class=\"api-key-btn\" onclick=\"saveApiKey()\">Start AXIS</button>
    </div>
  </div>
  
  <header class=\"header\">
    <div class=\"logo\">
      <div class=\"logo-icon\">AX</div>
      <div>
        <div class=\"logo-text\">AXIS</div>
        <div class=\"logo-sub\">Lily Palmer's AI</div>
      </div>
    </div>
    <div class=\"header-actions\">
      <div class=\"status\">
        <div class=\"status-dot\"></div>
        <span>Online</span>
      </div>
      <button class=\"settings-btn\" onclick=\"showApiKeyModal()\" title=\"Settings\">
        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"3\"></circle><path d=\"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z\"></path></svg>
      </button>
    </div>
  </header>
  
  <main class=\"chat-container\">
    <div id=\"scheduleWidget\" class=\"schedule-widget\" style=\"display: none;\">
      <div class=\"schedule-header\">
        <h3>Today's Blocks</h3>
        <span class=\"schedule-day\" id=\"scheduleDay\">-</span>
      </div>
      <div class=\"schedule-blocks\" id=\"scheduleBlocks\"></div>
    </div>
    
    <div class=\"messages\" id=\"messages\">
      <div class=\"welcome\">
        <h2>Good morning, Lily.</h2>
        <p>I'm AXIS — your personal AI.<br>What can I help you with today?</p>
      </div>
    </div>
    
    <div class=\"session-stats\">
      <span>📊 Sessions: <strong id=\"sessionCount\">0</strong></span>
      <span>🏆 Wins: <strong id=\"winsCount\">0</strong></span>
    </div>
  </main>
  
  <footer class=\"input-area\">
    <div class=\"input-wrapper\">
      <textarea class=\"input-box\" id=\"messageInput\" placeholder=\"Message AXIS...\" rows=\"1\"></textarea>
      <button class=\"send-btn\" id=\"sendBtn\" onclick=\"sendMessage()\">
        <svg viewBox=\"0 0 24 24\"><path d=\"M2.01 21L23 12 2.01 3 2 10l15 2-15 2z\"/></svg>
      </button>
    </div>
  </footer>

  <script>
    // API Base URL - auto-detect for Railway deployment
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3000'
      : window.location.origin;
    
    const messages = document.getElementById('messages');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    
    let sessionData = { sessions: 0, wins: 0 };
    let apiKey = localStorage.getItem('axis_api_key') || '';
    
    // Initialize
    if (apiKey) {
      document.getElementById('apiKeyModal').classList.add('hidden');
    }
    loadSchedule();
    setTimeout(loadCheckIn, 500);
    
    function showApiKeyModal() {
      document.getElementById('apiKeyModal').classList.remove('hidden');
      document.getElementById('apiKeyInput').value = apiKey;
      document.getElementById('apiKeyInput').focus();
    }
    
    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key) {
        apiKey = key;
        localStorage.setItem('axis_api_key', key);
        document.getElementById('apiKeyModal').classList.add('hidden');
      }
    }
    
    // Auto-resize textarea
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });
    
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      
      if (!apiKey) {
        addMessage('Please enter your API key to start chatting.', 'axis');
        showApiKeyModal();
        return;
      }
      
      input.value = '';
      input.style.height = 'auto';
      addMessage(text, 'user');
      
      const typing = document.createElement('div');
      typing.className = 'message axis typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      messages.appendChild(typing);
      messages.scrollTop = messages.scrollHeight;
      sendBtn.disabled = true;
      
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 30000);
        
        const resp = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
          body: JSON.stringify({ message: text, userId: 'lily' }),
          signal: controller.signal
        });
        clearTimeout(timeout);
        typing.remove();
        
        if (!resp.ok) {
          const err = await resp.json();
          if (resp.status === 401) {
            addMessage('Your API key may be invalid. Please update it.', 'error');
            showApiKeyModal();
          } else {
            addMessage(`Error: ${err.error || 'Something went wrong'}`, 'error');
          }
        } else {
          const data = await resp.json();
          addMessage(data.reply, 'axis', data.agent);
          sessionData = data.session;
          updateStats();
        }
      } catch (err) {
        typing.remove();
        addMessage('Connection error. Make sure AXIS server is running.', 'error');
      }
      
      sendBtn.disabled = false;
      input.focus();
    }
    
    function addMessage(text, type, agent = null) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = text + (agent && agent !== 'axis' ? `<span class=\"agent-badge\">${agent}</span>` : '');
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }
    
    function updateStats() {
      document.getElementById('sessionCount').textContent = sessionData.sessions;
      document.getElementById('winsCount').textContent = sessionData.wins;
    }
    
    async function loadSchedule() {
      try {
        const resp = await fetch(`${API_BASE}/schedule`);
        if (!resp.ok) return;
        const data = await resp.json();
        
        document.getElementById('scheduleDay').textContent = `${data.day} — ${data.focus}`;
        const blocksContainer = document.getElementById('scheduleBlocks');
        data.workBlocks.forEach(block => {
          const span = document.createElement('span');
          span.className = `schedule-block${block.active ? ' active' : ''}`;
          span.textContent = `${block.emoji} ${block.name}`;
          blocksContainer.appendChild(span);
        });
        document.getElementById('scheduleWidget').style.display = 'block';
      } catch {}
    }
    
    async function loadCheckIn() {
      try {
        const resp = await fetch(`${API_BASE}/checkin?userId=lily`);
        if (!resp.ok) return;
        const data = await resp.json();
        if (data.checkIn) {
          addMessage(data.checkIn, 'axis');
        }
      } catch {}
    }
  </script>
</body>
</html>
