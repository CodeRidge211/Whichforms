[build]
builder = 'nixpacks'
buildCommand = 'npm install && npm run db:generate && npm run build'

[deploy]
startCommand = 'npm run db:migrate && npm run db:seed && npm start'
restartPolicyType = 'ON_FAILURE'
restartPolicyMaxRetries = 3

[deploy.healthbeat]
path = '/api/health'
periodSeconds = 15
timeoutSeconds = 5
failureThreshold = 3